name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: linux-bash
            os: ubuntu-latest
            integration_filter: Category=Integration&Category=CrossPlatform&Shell=Bash
          - job_name: windows-powershell
            os: windows-latest
            integration_filter: Category=Integration&Category=CrossPlatform&Shell=PowerShell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true

      - name: Restore
        run: dotnet restore ASXRunTerminal.slnx

      - name: Build
        run: dotnet build ASXRunTerminal.slnx -c Release --no-restore

      - name: Run tests (excluding integration)
        run: dotnet test ASXRunTerminal.slnx -c Release --no-build --filter "Category!=Integration"

      - name: Run cross-platform integration tests
        run: dotnet test ASXRunTerminal.slnx -c Release --no-build --filter "${{ matrix.integration_filter }}"
